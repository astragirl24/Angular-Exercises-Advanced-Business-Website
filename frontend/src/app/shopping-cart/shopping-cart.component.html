<div class="container mt-4">
    <div class="card mb-4">
        <div class="card-header bg-primary text-white">
            Exercise 62: Session Visit Counter
        </div>
        <div class="card-body">
            <button class="btn btn-info mb-2" (click)="testSession()">Test Session API (/contact)</button>
            <div *ngIf="visitMessage" class="alert alert-success">
                {{ visitMessage }}
            </div>
        </div>
    </div>

    <div class="card mb-4">
        <div class="card-header bg-secondary text-white">
            Exercise 63: Products
        </div>
        <div class="card-body">
            <div class="row">
                <div class="col-md-4 mb-3" *ngFor="let p of products">
                    <div class="card h-100 text-center p-3">
                        <img [src]="p.image" class="card-img-top img-fluid mx-auto" alt="{{ p.name }}"
                            style="max-height: 150px; width: auto" />
                        <div class="card-body d-flex flex-column">
                            <h6 class="card-title">{{ p.name }}</h6>
                            <p class="card-text fw-bold text-success">${{ p.price }}</p>
                            <button class="btn btn-outline-primary mt-auto" (click)="addToCart(p)">Add To Cart</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="card-header bg-dark text-white">
            Shopping cart
        </div>
        <div class="card-body">
            <div class="table-responsive">
                <table class="table align-middle">
                    <thead>
                        <tr>
                            <th>Remove</th>
                            <th>Image</th>
                            <th>Product(s)</th>
                            <th>Price</th>
                            <th>Qty.</th>
                            <th>Total</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr *ngFor="let item of cart">
                            <td>
                                <button class="btn btn-sm btn-outline-danger" (click)="removeFromCart(item.id)">
                                    <i class="bi bi-trash">X</i>
                                </button>
                            </td>
                            <td><img [src]="item.image" alt="{{ item.name }}" width="50" /></td>
                            <td>{{ item.name }}</td>
                            <td>${{ item.price | number:'1.2-2' }}</td>
                            <td>
                                <input type="number" class="form-control form-control-sm text-center"
                                    style="width: 60px;" [(ngModel)]="item.quantity" min="1">
                            </td>
                            <td>${{ (item.price * item.quantity) | number:'1.2-2' }}</td>
                            <td>
                                <button class="btn btn-sm btn-info text-white"
                                    (click)="updateCart(item.id, item.quantity)">Update</button>
                            </td>
                        </tr>
                        <tr *ngIf="cart.length === 0">
                            <td colspan="7" class="text-center py-3 text-muted">Your cart is empty.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
