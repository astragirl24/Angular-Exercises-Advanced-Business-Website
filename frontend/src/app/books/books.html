<div style="padding: 20px;">
    <h2>BỖNG DƯNG MUỐN KHÓC</h2>
    
    <table border="1" style="width: 100%; border-collapse: collapse;">
        <tr style="background-color: #333; color: white;">
            <th>Mã sách</th>
            <th>Tên sách</th>
            <th>Giá bán</th>
            <th>Hình ảnh</th>
        </tr>
        
        <tr *ngFor="let p of books">
            <td>{{ p.BookId }}</td>
            <td style="color: blue; font-weight: bold;">{{ p.BookName }}</td>
            <td>{{ p.Price }}$</td>
            <td>
                <img [src]="p.Image" width="100px" (click)="view_detail(p.BookId)">
            </td>
            <td>
            <a [routerLink]="['/books/edit', p.BookId]" style="color: blue; margin-right: 10px;">
                Edit
            </a>

            <button (click)="deleteBook(p.BookId)" style="color: red; cursor: pointer;">
                Delete
            </button>
        </td>
        </tr>
    </table>
</div>
